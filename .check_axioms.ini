[check]
# getattr-not-initialized = false
# ignore -- comma-separated list of filename patterns for unused symbol checking
# (e.g. to allow for dynamic usage patterns that are hard to analyze statically)
ignore = *-old*,*good,tests/*,gitdiffnavtool.py.*
# check-unused = comma-separated list of filename patterns to run for checking unused symbols
# (e.g. functions, methods, classes)
# check-unused = scripts/check_axioms.py, gitdiffnavtool.py
check-unused = scripts/check_axioms.py

[base_class_attrs]
# Base-class attributes mapping for checking inherited attributes
# Format: <BaseClass> = attr1, attr2, attr3
# Customize this section for your project's base classes.
ListView = id, children, index, name, app, _current_focus, _current_layout
ListItem = _raw_text, _filename
App = current_hash, previous_hash, rel_dir, rel_file
ModalScreen =
Label = text, renderable
Widget = id, name

[base_class_methods]
# Base-class name = comma-separated glob-style method name patterns
ListView = key_*, on_focus, on_prune
App = key_*, compose, on_mount
ModalScreen = compose, on_key
